name: Nightly AI Orchestrator (AWS Runner)

# Duplicate of claude-github-demo's nightly-orchestrator.yml.
# Runs on a self-hosted EC2 runner provisioned by infra/ec2.tf.
#
# Required GitHub Actions variables (repo Settings → Variables):
#   TARGET_REPO — the Java project repo, e.g. neha-eglund/claude-github-demo
#
# Required secrets: ANTHROPIC_API_KEY, and all pentest/Stripe credentials.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_pentest:
        description: '1. Payment API Pentest'
        type: boolean
        default: true
      run_pr_review:
        description: '2. PR Review'
        type: boolean
        default: true
      run_dependency_audit:
        description: '3. Dependency Audit'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  pentest:
    name: Payment API Pentest
    if: ${{ github.event_name == 'schedule' || inputs.run_pentest == true }}
    uses: ./.github/workflows/nightly-pentest.yml
    secrets: inherit
    with:
      target_repo: ${{ vars.TARGET_REPO }}

  pr-review:
    name: PR Review
    if: ${{ github.event_name == 'schedule' || inputs.run_pr_review == true }}
    uses: ./.github/workflows/nightly-pr-review.yml
    secrets: inherit
    with:
      target_repo: ${{ vars.TARGET_REPO }}

  # dependency-audit disabled — Claude Code app not installed on target repo
  # Re-enable by restoring the if condition once the app is configured.
  # dependency-audit:
  #   name: Dependency Audit
  #   if: ${{ github.event_name == 'schedule' || inputs.run_dependency_audit == true }}
  #   uses: ./.github/workflows/nightly-dependency-audit.yml
  #   secrets: inherit
  #   with:
  #     target_repo: ${{ vars.TARGET_REPO }}

  morning-briefing:
    name: Morning Briefing
    needs: [pentest, pr-review]
    if: always()
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write consolidated job summary
        if: always()
        run: |
          result_icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⏹️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          PENTEST_ICON=$(result_icon "${{ needs.pentest.result }}")
          PR_ICON=$(result_icon "${{ needs.pr-review.result }}")

          {
            echo "## 🌙 Nightly AI Orchestrator — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Payment API Pentest | $PENTEST_ICON \`${{ needs.pentest.result }}\` |"
            echo "| PR Review           | $PR_ICON \`${{ needs.pr-review.result }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create morning briefing with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowed-tools
            Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh run view:*),Bash(date:*)
          prompt: |
            You are the morning briefing agent for ${{ vars.TARGET_REPO }}.
            Today's date: $(date -u +%Y-%m-%d).

            The two nightly jobs have just completed:
            - Pentest:    ${{ needs.pentest.result }}
            - PR Review:  ${{ needs.pr-review.result }}

            1. Check if today's briefing issue already exists:
               gh issue list --repo ${{ vars.TARGET_REPO }} --search "Nightly AI Report $(date -u +%Y-%m-%d)" --json number --jq length
               If count > 0, stop.

            2. Read recent open issues for overnight findings:
               gh issue list --repo ${{ vars.TARGET_REPO }} --state open --limit 20 --json number,title,labels,createdAt

            3. Create a morning briefing issue in ${{ vars.TARGET_REPO }}:
               Title: "🌙 Nightly AI Report — $(date -u +%Y-%m-%d)"
               Labels: nightly-report
          show_full_output: true
